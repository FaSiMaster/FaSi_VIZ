      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)
    - script: |
        image="$(containerRegistry)/$(imageRepository1)"
        docker pull "$image:$(Build.SourceVersion)" && echo "##vso[task.setvariable variable=imagename;]$image" || true
      displayName: Test if image exists for this commit
    - script: |
        docker tag "$(imagename):$(Build.SourceVersion)" "$(imagename):$(Build.SourceBranchName)"
        docker push "$(imagename):$(Build.SourceBranchName)"
      displayName: Push new tag if image exists
