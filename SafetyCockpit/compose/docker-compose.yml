version: '3.8'

services:
  safetycockpit:
    image: baudifasi.azurecr.io/safetycockpit

  nginx:
    image: baudifasi.azurecr.io/nginx:latest
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - safetycockpit
    command: >
      /bin/sh -c "
      if [ ! -f /etc/nginx/certs/selfsigned.crt ]; then
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/certs/selfsigned.key -out /etc/nginx/certs/selfsigned.crt -subj '/CN=localhost';
      fi &&
      nginx -g 'daemon off;'"
