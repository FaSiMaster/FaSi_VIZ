name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/fasi_zh_viz/ --ignore-missing-imports

      - name: Test with pytest
        run: pytest tests/ -v --cov=fasi_zh_viz --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Security scan with bandit
        run: bandit -r src/fasi_zh_viz/ -ll

  # Publish-Job nur aktiv, wenn auf einen v*-Tag gepusht wird UND PYPI_API_TOKEN gesetzt ist.
  # Aktuell wird die Library per `pip install git+https://...` verteilt und NICHT auf PyPI.
  # Zum Aktivieren: PYPI_API_TOKEN als Repository-Secret hinterlegen.
  publish:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Prüfe PYPI_API_TOKEN
        id: check_token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Publish übersprungen::PYPI_API_TOKEN nicht gesetzt. Paket wird nicht auf PyPI publiziert."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check_token.outputs.has_token == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        if: steps.check_token.outputs.has_token == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check_token.outputs.has_token == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
